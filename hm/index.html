<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Hitmarker VFX Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        .bg-checker {
            background-image: 
                linear-gradient(45deg, #1f2229 25%, transparent 25%, transparent 75%, #1f2229 75%, #1f2229),
                linear-gradient(45deg, #1f2229 25%, transparent 25%, transparent 75%, #1f2229 75%, #1f2229);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-color: #111318;
        }

        /* Range Slider Styling */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #0ea5e9; cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #3f3f46; border-radius: 2px;
        }
        
        /* Hide Number Input Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-6 selection:bg-sky-500 selection:text-white">

    <div class="max-w-[1600px] mx-auto">
        <!-- Header -->
        <header class="mb-6 border-b border-zinc-800 pb-4 flex flex-col lg:flex-row lg:justify-between lg:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 via-blue-500 to-emerald-400">
                    Pro Hitmarker VFX Studio
                </h1>
                <p class="text-zinc-400 text-sm mt-1">Design, Preview, and Export 60FPS Image Sequences</p>
            </div>
            
            <div class="flex flex-wrap items-end gap-3">
                <div class="bg-zinc-900 p-2 rounded-xl border border-zinc-800 flex gap-4 items-center px-4">
                    <div>
                        <label class="text-[10px] uppercase text-zinc-500 font-bold block mb-1">Export Size</label>
                        <div class="flex items-center gap-2">
                            <input type="number" id="exportW" value="512" class="w-16 bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-xs focus:border-sky-500 outline-none text-center">
                            <span class="text-zinc-600 text-xs">x</span>
                            <input type="number" id="exportH" value="512" class="w-16 bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-xs focus:border-sky-500 outline-none text-center">
                        </div>
                    </div>
                </div>

                <button id="exportBtn" onclick="exportSequence()" class="bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 text-white font-semibold py-2 px-6 rounded-xl transition-all shadow-[0_0_20px_rgba(14,165,233,0.2)] hover:shadow-[0_0_30px_rgba(14,165,233,0.4)] flex items-center gap-2 h-[54px]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span>Export Sequence (.ZIP)</span>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-140px)]">
            
            <!-- Left Column: Preview & Presets -->
            <div class="lg:col-span-8 flex flex-col gap-4 h-full">
                
                <!-- Canvas Container -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-1 flex flex-col relative group flex-grow">
                    <!-- Toolbar -->
                    <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-10 pointer-events-none">
                        <div class="flex items-center gap-2 pointer-events-auto">
                            <div class="flex gap-1 text-xs bg-zinc-950/90 backdrop-blur p-1 rounded-lg border border-zinc-700/50 shadow-lg">
                                <button id="bgTransparent" class="px-3 py-1.5 rounded bg-zinc-700 text-white shadow-sm transition">Grid</button>
                                <button id="bgGreen" class="px-3 py-1.5 rounded text-zinc-400 hover:text-white hover:bg-zinc-800 transition">Green</button>
                                <button id="bgImage" class="px-3 py-1.5 rounded text-zinc-400 hover:text-white hover:bg-zinc-800 transition flex gap-1 items-center">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    Upload BG
                                </button>
                                <input type="file" id="fileInput" accept="image/*" class="hidden">
                            </div>
                        </div>
                        <button onclick="toggleFullscreen()" class="pointer-events-auto p-2 bg-zinc-950/90 backdrop-blur border border-zinc-700/50 rounded-lg text-zinc-400 hover:text-white hover:border-sky-500 transition shadow-lg" title="Fullscreen Preview">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                        </button>
                    </div>

                    <!-- Canvas -->
                    <div id="canvasContainer" class="relative w-full h-full rounded-lg overflow-hidden border border-zinc-800 bg-checker flex items-center justify-center shadow-inner">
                        <canvas id="previewCanvas" class="w-full h-full object-contain"></canvas>
                        
                        <!-- Center Guide -->
                        <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-10">
                            <div class="w-px h-full bg-red-500 absolute"></div>
                            <div class="h-px w-full bg-red-500 absolute"></div>
                        </div>
                    </div>
                </div>

                <!-- Presets Bar -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 shrink-0">
                    <div class="flex items-center gap-4 overflow-x-auto pb-2 custom-scrollbar">
                        <span class="text-xs font-bold text-zinc-500 uppercase tracking-wider whitespace-nowrap">Load Preset:</span>
                        <button onclick="applyPreset('mw2019_hit')" class="whitespace-nowrap px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-xs transition">Standard Hit</button>
                        <button onclick="applyPreset('mw2019_headshot')" class="whitespace-nowrap px-3 py-1.5 bg-zinc-800 hover:bg-yellow-900/30 border border-zinc-700 hover:border-yellow-600 rounded text-xs transition text-yellow-500">Double / Headshot</button>
                        <button onclick="applyPreset('mw2019_kill')" class="whitespace-nowrap px-3 py-1.5 bg-zinc-800 hover:bg-red-900/30 border border-zinc-700 hover:border-red-600 rounded text-xs transition text-red-400">Kill Confirmed</button>
                        <button onclick="applyPreset('apex_shield')" class="whitespace-nowrap px-3 py-1.5 bg-zinc-800 hover:bg-purple-900/30 border border-zinc-700 hover:border-purple-500 rounded text-xs transition text-purple-400">Shield Crack</button>
                        <button onclick="applyPreset('hero_pointy')" class="whitespace-nowrap px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-xs transition">Hero Pointy</button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Controls -->
            <div class="lg:col-span-4 bg-zinc-900 border border-zinc-800 rounded-xl flex flex-col h-full overflow-hidden">
                <div class="p-4 border-b border-zinc-800 bg-zinc-900/50">
                    <h2 class="font-semibold text-sm uppercase tracking-wider text-zinc-400">Properties</h2>
                </div>
                
                <div class="p-5 overflow-y-auto custom-scrollbar flex-grow space-y-6">
                    
                    <!-- Appearance Group -->
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-sky-500 uppercase">Visual Style</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2">
                                <label class="text-xs text-zinc-400 block mb-1">Hit Type</label>
                                <select id="style" class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-xs focus:border-sky-500 outline-none">
                                    <option value="standard">Standard (Single X)</option>
                                    <option value="double">Double (Headshot X)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-zinc-400 block mb-1">Shape</label>
                                <select id="shape" class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-xs focus:border-sky-500 outline-none">
                                    <option value="line">Flat Line</option>
                                    <option value="tapered">Pointy / Sharp</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-zinc-400 block mb-1">Cap Style</label>
                                <select id="cap" class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-xs focus:border-sky-500 outline-none">
                                    <option value="butt">Flat Cut</option>
                                    <option value="round">Rounded</option>
                                    <option value="square">Extended</option>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="text-xs text-zinc-400 block mb-1">Primary Color</label>
                                <div class="flex gap-2">
                                    <input type="color" id="color" value="#ffffff" class="h-8 w-12 rounded bg-zinc-950 border border-zinc-700 p-0.5 cursor-pointer">
                                    <input type="text" id="colorHex" value="#ffffff" class="flex-grow bg-zinc-950 border border-zinc-700 rounded px-2 text-xs uppercase font-mono">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h-px bg-zinc-800 w-full"></div>

                    <!-- Geometry Group -->
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-sky-500 uppercase">Geometry</h3>
                        
                        <div>
                            <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Line Thickness</label><span id="valThickness" class="font-mono text-zinc-200">4px</span></div>
                            <input type="range" id="thickness" min="1" max="40" value="4">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Line Length</label><span id="valLength" class="font-mono text-zinc-200">25px</span></div>
                            <input type="range" id="length" min="5" max="150" value="25">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Center Gap</label><span id="valGap" class="font-mono text-zinc-200">15px</span></div>
                            <input type="range" id="gap" min="0" max="100" value="15">
                        </div>
                        <!-- Double Specific -->
                        <div id="doubleControls" class="hidden p-3 bg-zinc-950/50 rounded-lg border border-zinc-800 space-y-3">
                            <label class="text-xs font-bold text-zinc-500 block">Double Cross Settings</label>
                            <div>
                                <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Inner Scale</label><span id="valInnerScale" class="font-mono text-zinc-200">0.7x</span></div>
                                <input type="range" id="innerScale" min="0.1" max="1.5" step="0.1" value="0.7">
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Offset</label><span id="valOffset" class="font-mono text-zinc-200">0px</span></div>
                                <input type="range" id="offset" min="-20" max="20" value="0">
                            </div>
                        </div>
                    </div>

                    <div class="h-px bg-zinc-800 w-full"></div>

                    <!-- Animation Group -->
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-sky-500 uppercase">Animation Physics</h3>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-zinc-400 block mb-1">Direction</label>
                                <select id="direction" class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-xs outline-none">
                                    <option value="outward">Pop Outward</option>
                                    <option value="inward">Snap Inward</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-zinc-400 block mb-1">Easing Curve</label>
                                <select id="easing" class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-xs outline-none">
                                    <option value="linear">Linear</option>
                                    <option value="easeOutQuad">Ease Out (Soft)</option>
                                    <option value="easeOutCubic" selected>Ease Out (Standard)</option>
                                    <option value="easeOutBack">Elastic Pop</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Travel Distance</label><span id="valTravel" class="font-mono text-zinc-200">20px</span></div>
                            <input type="range" id="travel" min="0" max="200" value="20">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1 text-zinc-400"><label>Duration (Speed)</label><span id="valDuration" class="font-mono text-zinc-200">250ms</span></div>
                            <input type="range" id="duration" min="50" max="1500" step="10" value="250">
                        </div>
                        
                        <div class="flex items-center justify-between p-2 bg-zinc-950/50 rounded border border-zinc-800">
                            <label class="text-xs text-zinc-300">Enable Fade Out</label>
                            <input type="checkbox" id="fadeToggle" checked class="w-4 h-4 rounded border-zinc-700 bg-zinc-900 text-sky-500 focus:ring-sky-500">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        const config = {
            style: 'standard', // 'standard', 'double'
            shape: 'line',     // 'line', 'tapered'
            cap: 'butt',
            color: '#ffffff',
            thickness: 4,
            length: 25,
            gap: 15,
            innerScale: 0.7, // For double style
            offset: 0,       // For double style
            direction: 'outward',
            easing: 'easeOutCubic',
            travel: 20,
            duration: 250,
            fade: true,
            background: 'transparent',
            bgImage: null // Stores the Image object
        };

        const presets = {
            'mw2019_hit': { style: 'standard', shape: 'line', cap: 'butt', color: '#ffffff', thickness: 3, length: 22, gap: 12, direction: 'outward', easing: 'easeOutCubic', travel: 8, duration: 150, fade: true },
            'mw2019_headshot': { style: 'double', shape: 'line', cap: 'butt', color: '#ffb300', thickness: 3, length: 30, gap: 14, innerScale: 0.6, offset: 0, direction: 'outward', easing: 'easeOutBack', travel: 15, duration: 300, fade: true },
            'mw2019_kill': { style: 'standard', shape: 'line', cap: 'round', color: '#ff1100', thickness: 5, length: 35, gap: 10, direction: 'outward', easing: 'easeOutQuad', travel: 30, duration: 400, fade: true },
            'apex_shield': { style: 'standard', shape: 'tapered', cap: 'butt', color: '#a855f7', thickness: 8, length: 25, gap: 20, direction: 'inward', easing: 'easeOutBack', travel: 40, duration: 250, fade: true },
            'hero_pointy': { style: 'standard', shape: 'tapered', cap: 'butt', color: '#ffffff', thickness: 12, length: 15, gap: 5, direction: 'outward', easing: 'easeOutCubic', travel: 20, duration: 180, fade: true }
        };

        // --- DOM Elements ---
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const exportBtn = document.getElementById('exportBtn');
        const fileInput = document.getElementById('fileInput');

        // Inputs mapping
        const inputs = {
            style: document.getElementById('style'),
            shape: document.getElementById('shape'),
            cap: document.getElementById('cap'),
            color: document.getElementById('color'),
            colorHex: document.getElementById('colorHex'),
            thickness: document.getElementById('thickness'),
            length: document.getElementById('length'),
            gap: document.getElementById('gap'),
            innerScale: document.getElementById('innerScale'),
            offset: document.getElementById('offset'),
            direction: document.getElementById('direction'),
            easing: document.getElementById('easing'),
            travel: document.getElementById('travel'),
            duration: document.getElementById('duration'),
            fadeToggle: document.getElementById('fadeToggle')
        };

        const displays = {
            thickness: document.getElementById('valThickness'),
            length: document.getElementById('valLength'),
            gap: document.getElementById('valGap'),
            innerScale: document.getElementById('valInnerScale'),
            offset: document.getElementById('valOffset'),
            travel: document.getElementById('valTravel'),
            duration: document.getElementById('valDuration')
        };

        // --- Initialization ---
        function init() {
            // Resize canvas to internal high res for crisp rendering, displayed via CSS
            canvas.width = 1920;
            canvas.height = 1080;
            
            // Attach Listeners
            Object.keys(inputs).forEach(key => {
                const input = inputs[key];
                if(input.type === 'checkbox') {
                    input.addEventListener('change', updateConfigFromUI);
                } else {
                    input.addEventListener('input', updateConfigFromUI);
                }
            });

            // Color Hex Sync
            inputs.color.addEventListener('input', () => inputs.colorHex.value = inputs.color.value);
            inputs.colorHex.addEventListener('input', () => {
                if(/^#[0-9A-F]{6}$/i.test(inputs.colorHex.value)) {
                    inputs.color.value = inputs.colorHex.value;
                    updateConfigFromUI();
                }
            });

            // BG Controls
            document.getElementById('bgTransparent').addEventListener('click', () => setBackground('transparent'));
            document.getElementById('bgGreen').addEventListener('click', () => setBackground('green'));
            document.getElementById('bgImage').addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', handleImageUpload);

            updateConfigFromUI();
            requestAnimationFrame(loop);
        }

        // --- Core Logic ---

        function updateConfigFromUI() {
            config.style = inputs.style.value;
            config.shape = inputs.shape.value;
            config.cap = inputs.cap.value;
            config.color = inputs.color.value;
            config.thickness = parseInt(inputs.thickness.value);
            config.length = parseInt(inputs.length.value);
            config.gap = parseInt(inputs.gap.value);
            config.innerScale = parseFloat(inputs.innerScale.value);
            config.offset = parseInt(inputs.offset.value);
            config.direction = inputs.direction.value;
            config.easing = inputs.easing.value;
            config.travel = parseInt(inputs.travel.value);
            config.duration = parseInt(inputs.duration.value);
            config.fade = inputs.fadeToggle.checked;

            // UI Updates
            displays.thickness.innerText = config.thickness + 'px';
            displays.length.innerText = config.length + 'px';
            displays.gap.innerText = config.gap + 'px';
            displays.innerScale.innerText = config.innerScale.toFixed(1) + 'x';
            displays.offset.innerText = config.offset + 'px';
            displays.travel.innerText = config.travel + 'px';
            displays.duration.innerText = config.duration + 'ms';

            // Show/Hide Double specific controls
            const doubleGroup = document.getElementById('doubleControls');
            if(config.style === 'double') doubleGroup.classList.remove('hidden');
            else doubleGroup.classList.add('hidden');
            
            // Show/Hide Cap control (irrelevant for tapered)
            if(config.shape === 'tapered') inputs.cap.disabled = true;
            else inputs.cap.disabled = false;
        }

        function setBackground(type) {
            config.background = type;
            const container = document.getElementById('canvasContainer');
            if (type === 'transparent') {
                container.style.backgroundColor = ''; 
                container.classList.add('bg-checker');
            } else if (type === 'green') {
                container.classList.remove('bg-checker');
                container.style.backgroundColor = '#00ff00';
            }
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    config.bgImage = img;
                    config.background = 'image';
                    document.getElementById('canvasContainer').classList.remove('bg-checker');
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function applyPreset(name) {
            const p = presets[name];
            if (!p) return;
            
            // Set inputs
            Object.keys(p).forEach(k => {
                if(inputs[k]) {
                    if(inputs[k].type === 'checkbox') inputs[k].checked = p[k];
                    else inputs[k].value = p[k];
                }
            });
            inputs.colorHex.value = p.color;

            updateConfigFromUI();
            animTime = 0; // Reset animation
        }

        function toggleFullscreen() {
            const container = document.getElementById('canvasContainer');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // --- Math & Drawing ---

        const easings = {
            linear: (t) => t,
            easeOutQuad: (t) => 1 - (1 - t) * (1 - t),
            easeOutCubic: (t) => 1 - Math.pow(1 - t, 3),
            easeOutBack: (t) => {
                const c1 = 1.70158;
                const c3 = c1 + 1;
                return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
            }
        };

        function drawShape(ctx, gap, len, thickness, angleRad, color) {
            ctx.save();
            ctx.rotate(angleRad);
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;
            ctx.lineCap = config.cap;

            if (config.shape === 'tapered') {
                // Draw a triangle pointing outwards
                ctx.beginPath();
                // Start center-ish (wide)
                ctx.moveTo(gap, -thickness / 2);
                ctx.lineTo(gap, thickness / 2);
                // End tip (pointy)
                ctx.lineTo(gap + len, 0);
                ctx.closePath();
                ctx.fill();
            } else {
                // Standard Line
                ctx.beginPath();
                ctx.moveTo(gap, 0);
                ctx.lineTo(gap + len, 0);
                ctx.stroke();
            }
            ctx.restore();
        }

        function renderFrame(context, w, h, progress, isExporting) {
            context.clearRect(0, 0, w, h);

            // Background Handling
            if (!isExporting) {
                if (config.background === 'image' && config.bgImage) {
                    // Draw image cover (contain or cover logic)
                    const img = config.bgImage;
                    const scale = Math.max(w / img.width, h / img.height);
                    const x = (w / 2) - (img.width / 2) * scale;
                    const y = (h / 2) - (img.height / 2) * scale;
                    context.drawImage(img, x, y, img.width * scale, img.height * scale);
                    // Dim background slightly for visibility
                    context.fillStyle = 'rgba(0,0,0,0.3)';
                    context.fillRect(0,0,w,h);
                } else if (config.background === 'green') {
                    context.fillStyle = '#00FF00';
                    context.fillRect(0, 0, w, h);
                }
            } else {
                // Exporting
                if (config.background === 'green') {
                    context.fillStyle = '#00FF00';
                    context.fillRect(0, 0, w, h);
                }
            }

            // Animation Math
            const easeFn = easings[config.easing] || easings.linear;
            const easeVal = easeFn(progress);

            // Movement
            let currentGap = config.gap;
            if (config.direction === 'outward') {
                currentGap += (config.travel * easeVal);
            } else {
                currentGap = (config.gap + config.travel) - (config.travel * easeVal);
            }

            // Opacity
            let opacity = 1;
            if (config.fade) {
                opacity = 1 - easeVal; // linear fade matching ease
                // Or make fade kick in later? 
                // Let's stick to syncing fade with movement for classic COD feel
            }

            if (opacity <= 0) return;

            context.save();
            context.translate(w / 2, h / 2);
            context.globalAlpha = opacity;

            // Draw 4 arms
            for (let i = 0; i < 4; i++) {
                // 45, 135, 225, 315 degrees
                const angle = (45 + (i * 90)) * (Math.PI / 180);
                
                // Draw Main Shape
                drawShape(context, currentGap, config.length, config.thickness, angle, config.color);

                // Draw Double / Headshot Secondary Shape
                if (config.style === 'double') {
                    // Usually a smaller cross inside, slightly offset
                    // If offset is 0, it's just a smaller X inside the big X
                    
                    // Logic: Draw another shape rotated the same way
                    // But with different gap/length/thickness
                    
                    const innerGap = Math.max(0, currentGap + config.offset);
                    const innerLen = config.length * config.innerScale;
                    const innerThick = Math.max(1, config.thickness * config.innerScale);
                    
                    // To make it look like a distinct X, we often render it *behind* or *in front*
                    // Just rendering it on top here.
                    // Note: If offset is 0 and scale < 1, it overlaps.
                    
                    // Let's create a slight visual distinction by maybe rendering 
                    // a second set of 4 lines if it was a true "double line" style, 
                    // but standard COD headshot is just a separate X.
                    
                    drawShape(context, innerGap, innerLen, innerThick, angle, config.color);
                }
            }

            context.restore();
        }

        // --- Loop ---
        let lastTime = performance.now();
        let animTime = 0;
        let isExporting = false;

        function loop(timestamp) {
            if (isExporting) return;

            let dt = timestamp - lastTime;
            lastTime = timestamp;
            if (dt > 100) dt = 16; // lag prevention

            animTime += dt;
            const totalCycle = config.duration + 600; // Wait time between loops

            let progress = 0;
            if (animTime < config.duration) {
                progress = animTime / config.duration;
            } else if (animTime > totalCycle) {
                animTime = 0;
            } else {
                progress = 1; // Hold at end state
            }
            
            // Limit progress to 1 for render calculation
            renderFrame(ctx, canvas.width, canvas.height, Math.min(1, progress), false);

            requestAnimationFrame(loop);
        }

        // --- Export ---
        async function exportSequence() {
            isExporting = true;
            const width = parseInt(document.getElementById('exportW').value) || 512;
            const height = parseInt(document.getElementById('exportH').value) || 512;
            
            const btn = exportBtn;
            const oldText = btn.innerHTML;
            btn.innerHTML = `<span>Rendering...</span>`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            const zip = new JSZip();
            const eCanvas = document.createElement('canvas');
            eCanvas.width = width;
            eCanvas.height = height;
            const eCtx = eCanvas.getContext('2d');

            const fps = 60;
            const totalFrames = Math.ceil((config.duration / 1000) * fps);

            for(let i=0; i <= totalFrames + 5; i++) { // +5 frames padding
                let progress = i / totalFrames;
                if(progress > 1) progress = 1;

                renderFrame(eCtx, width, height, progress, true);
                
                const data = eCanvas.toDataURL('image/png').split(',')[1];
                zip.file(`hitmarker_${i.toString().padStart(3, '0')}.png`, data, {base64: true});
            }

            btn.innerHTML = `<span>Compressing...</span>`;

            try {
                const content = await zip.generateAsync({type: "blob"});
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `hitmarker_${config.style}_${width}x${height}.zip`;
                link.click();
            } catch(e) {
                alert("Export failed.");
                console.error(e);
            }

            btn.innerHTML = oldText;
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
            isExporting = false;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        // Run
        init();

    </script>
</body>
</html>
